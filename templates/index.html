<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Курсы валют от ЦБ РФ</title>
</head>
<body>
    <h1>Курсы валют</h1>

    {% if error %}
        <p style="color: red;">Ошибка: {{ error }}</p>
    {% endif %}

    <form method="post">
        <label for="codes">Введите коды валют через запятую (например, USD, EUR, GBP):</label><br>
        <input type="text" name="codes" id="codes" style="width: 300px;">
        <button type="submit">Обновить курсы</button>
    </form>

    <h2>Текущие курсы:</h2>
    {% if currencies %}
        <table border="1" cellpadding="5">
            <tr>
                <th>Валюта</th>
                <th>Дата и время</th>
                <th>Курс</th>
            </tr>
            {% for c in currencies %}
                <tr>
                    <td>{{ c.id }}</td>
                    <td>{{ c.datetime }}</td>
                    <td>{{ c.value }}</td>
                </tr>
            {% endfor %}
        </table>
    {% else %}
        <p>Нет данных. Введите валюты и нажмите "Обновить курсы".</p>
    {% endif %}
</body>
</html>
